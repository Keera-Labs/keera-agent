[project]
name = "keera-mcp"
version = "0.1.0"
description = "Standalone MCP server for Keera — exposes task management and agent tools via the Model Context Protocol"
requires-python = ">=3.13"
dependencies = [
    "mcp[cli]>=1.0.0",
    "fastapi-startkit[fastapi,database,sqlite]>=0.26.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["keera_mcp"]

[project.scripts]
keera-mcp = "keera_mcp.__main__:main"
